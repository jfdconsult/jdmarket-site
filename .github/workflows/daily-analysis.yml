name: Daily B3 Analysis

on:
  # 21:05 UTC = 18:05 BRT (UTC-3), segunda a sexta
  schedule:
    - cron: '5 21 * * 1-5'
  # Permite disparar manualmente pelo GitHub UI
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 100

    steps:
      - name: Notificar início
        run: |
          curl -s -X POST "https://api.twilio.com/2010-04-01/Accounts/${TWILIO_SID}/Messages.json" \
            -u "${TWILIO_SID}:${TWILIO_TOKEN}" \
            --data-urlencode "From=${TWILIO_FROM}" \
            --data-urlencode "To=${TWILIO_TO}" \
            --data-urlencode "Body=🟡 Pipeline B3 iniciado — $(TZ=America/Sao_Paulo date '+%d/%m/%Y às %H:%M') BRT"
        env:
          TWILIO_SID:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM:  ${{ secrets.TWILIO_FROM }}
          TWILIO_TO:    ${{ secrets.TWILIO_TO }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install pipeline dependencies
        run: npm install dotenv
        working-directory: ./pipeline

      # ── Fase 1: Top 50 dinâmico ──────────────────────────────────────────────
      - name: Run rotina_50 (50 ativos dinâmicos)
        run: node rotina_50.mjs
        working-directory: ./pipeline/b3
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          HG_KEY: ${{ secrets.HG_KEY }}
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
        timeout-minutes: 20

      # ── Fase 2: Al Brooks 8 frameworks ──────────────────────────────────────
      - name: Run rotina_ab (Al Brooks)
        run: node rotina_ab.mjs
        working-directory: ./pipeline/b3
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        timeout-minutes: 30

      # ── Upload para Neon ─────────────────────────────────────────────────────
      - name: Upload to Neon
        run: node pipeline/upload_to_neon.mjs pipeline/b3/data_ab.json
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SITE_URL: ${{ secrets.SITE_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}

      # ── Salvar outputs como artefatos (diagnóstico) ──────────────────────────
      - name: Upload pipeline outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-${{ github.run_id }}
          path: |
            pipeline/b3/data_50.json
            pipeline/b3/data_ab.json
            pipeline/b3/logs/
          retention-days: 7

      - name: Notificar resultado
        if: always()
        run: |
          STATUS="${{ job.status }}"
          HORA=$(TZ=America/Sao_Paulo date '+%d/%m/%Y às %H:%M')
          if [ "$STATUS" = "success" ]; then
            MSG="✅ Pipeline B3 concluído — ${HORA} BRT | 50 ativos no ar"
          else
            MSG="❌ Pipeline B3 FALHOU — ${HORA} BRT | verificar GitHub Actions"
          fi
          curl -s -X POST "https://api.twilio.com/2010-04-01/Accounts/${TWILIO_SID}/Messages.json" \
            -u "${TWILIO_SID}:${TWILIO_TOKEN}" \
            --data-urlencode "From=${TWILIO_FROM}" \
            --data-urlencode "To=${TWILIO_TO}" \
            --data-urlencode "Body=${MSG}"
        env:
          TWILIO_SID:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM:  ${{ secrets.TWILIO_FROM }}
          TWILIO_TO:    ${{ secrets.TWILIO_TO }}
