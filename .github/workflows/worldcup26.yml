name: WorldCup26 - Painel (nuvem)

# Roda no servidor do GitHub (sem depender do PC do Joao).
# Regenera o painel a partir dos dados do repositorio e publica (Vercel deploya no push).
on:
  # Cobertura de 73 jogos na nuvem OK (feed simples correto). Trava de seguranca
  # impede publicar painel com <40 jogos ou vazio.
  schedule:
    # 11:00 UTC = 08:00 BRT — refresh do dia (odds + painel)
    - cron: '0 11 * * *'
    # a cada 2h — mantem painel atual + (futuro) resultados apos os jogos
    - cron: '0 */2 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: worldcup26-painel
  cancel-in-progress: false

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Regenerar painel a partir dos dados do repo
        env:
          WC_DB_DIR: ${{ github.workspace }}/worldcup26-engine/data/db
          WC_FEED_DIR: ${{ github.workspace }}/worldcup26-engine/data/feed
          WC_DADOS_DIR: ${{ github.workspace }}/worldcup26-engine/data/dados
          WC_DEPLOY_DIR: ${{ github.workspace }}/public/worldcup26
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
        run: |
          cd worldcup26-engine/scripts
          python bet_math.py dashboard                          # painel (odds/modelo)
          python bet_math_v3_discipline.py enrich-dashboard     # disciplina/arbitro + placar FIFA
          python update_history.py refresh                      # historico/track record (resultados)

      - name: Commit e deploy (Vercel publica no push)
        run: |
          git config user.name "worldcup26-bot"
          git config user.email "bot@jdmarket.ai"
          PANEL=public/worldcup26/dashboard_data.js
          # TRAVA DE SEGURANCA: nunca publica painel vazio/quebrado/baixa-cobertura.
          SIZE=$(wc -c < "$PANEL")
          NGAMES=$(grep -o '"n_games": *[0-9]*' "$PANEL" | grep -o '[0-9]*' | head -1)
          if [ "$SIZE" -lt 500000 ] || grep -q '"error"' "$PANEL" || [ "${NGAMES:-0}" -lt 40 ]; then
            echo "Painel invalido/cobertura baixa (tamanho=$SIZE, n_games=${NGAMES:-0}) — NAO publica."
            git checkout -- public/worldcup26/ || true
            exit 0
          fi
          git add public/worldcup26/dashboard_data.js public/worldcup26/dashboard_data_v3.js public/worldcup26/dashboard_history.js
          # so publica se mudou algo ALEM do timestamp no painel OU no historico
          REAL_CHANGE=$(git diff --staged -U0 -- public/worldcup26/dashboard_data.js public/worldcup26/dashboard_history.js \
            | grep -E '^[+-]' | grep -vE '^(\+\+\+|---)' | grep -vE 'generated_at|"generated"' | head -1 || true)
          if [ -z "$REAL_CHANGE" ]; then
            echo "Sem mudanca real (apenas timestamp) — nada a publicar."
            git reset --quiet && git checkout -- public/worldcup26/ || true
          else
            git commit -m "worldcup26: atualizacao automatica nuvem $(TZ=America/Sao_Paulo date '+%d/%m %H:%M') BRT"
            git push
            echo "Publicado."
          fi
